<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agora — Тест звонков</title>
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3d;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --green: #00e5a0;
      --text: #e8e8f0;
      --muted: #6b6b88;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* Background mesh */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(108,99,255,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 80%, rgba(255,101,132,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper { position: relative; z-index: 1; width: 100%; max-width: 900px; }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 8px;
    }
    .logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; }
    .subtitle { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.78rem; }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 8px 18px;
      width: fit-content;
      margin: 0 auto 36px;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.calling { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Grid layout */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media(max-width: 620px) { .grid { grid-template-columns: 1fr; } }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .card-title {
      font-size: 0.7rem;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 18px;
    }

    /* Form elements */
    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-family: 'Space Mono', monospace;
    }
    input, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.88rem;
      padding: 10px 14px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }
    select option { background: var(--surface2); }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-danger {
      background: rgba(255,101,132,0.15);
      color: var(--accent2);
      border: 1px solid rgba(255,101,132,0.3);
    }
    .btn-danger:hover { background: rgba(255,101,132,0.25); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

    /* Video area */
    .video-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }
    .video-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }
    @media(max-width: 620px) { .video-grid { grid-template-columns: 1fr; } }

    .video-box {
      position: relative;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16/9;
    }
    .video-box video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .video-label {
      position: absolute;
      bottom: 10px; left: 10px;
      background: rgba(10,10,15,0.75);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--text);
      backdrop-filter: blur(6px);
    }
    .video-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
    }
    .video-empty-icon { font-size: 2rem; opacity: 0.4; }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .ctrl-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .ctrl-btn:hover { border-color: var(--accent); background: rgba(108,99,255,0.15); }
    .ctrl-btn.muted { background: rgba(255,101,132,0.15); border-color: var(--accent2); }
    .ctrl-btn.end-call {
      background: var(--accent2);
      border-color: var(--accent2);
      color: #fff;
      width: 60px; height: 60px;
      font-size: 1.4rem;
    }
    .ctrl-btn.end-call:hover { background: #ff3860; }
    .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Log */
    .log-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      height: 140px;
      overflow-y: auto;
      font-family: 'Space Mono', monospace;
      font-size: 0.74rem;
      line-height: 1.6;
      margin-top: 16px;
    }
    .log-line { margin-bottom: 2px; }
    .log-line.ok { color: var(--green); }
    .log-line.err { color: var(--accent2); }
    .log-line.info { color: var(--accent); }

    /* Token display */
    .token-display {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--green);
      word-break: break-all;
      margin-top: 10px;
      min-height: 60px;
      max-height: 100px;
      overflow-y: auto;
    }
    .hidden { display: none; }
    .divider { height: 1px; background: var(--border); margin: 16px 0; }
    .tag {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 6px;
    }
    .tag-audio { background: rgba(0,229,160,0.12); color: var(--green); border: 1px solid rgba(0,229,160,0.25); }
    .tag-video { background: rgba(108,99,255,0.12); color: var(--accent); border: 1px solid rgba(108,99,255,0.25); }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo-row">
      <div class="logo-icon">📡</div>
      <h1>Agora Call Tester</h1>
    </div>
    <p class="subtitle">// FastAPI + Agora RTC — тест аудио/видео звонков</p>
  </header>

  <!-- Status -->
  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Не подключён</span>
  </div>

  <!-- Settings + Token grid -->
  <div class="grid">
    <!-- Settings card -->
    <div class="card">
      <div class="card-title">⚙ Параметры</div>

      <label>API URL (бэкенд)</label>
      <input id="apiUrl" value="http://localhost:8000" placeholder="http://localhost:8000"/>

      <label>User ID</label>
      <input id="userId" type="number" value="1001" placeholder="Ваш user_id"/>

      <label>Channel (комната)</label>
      <input id="channelName" value="test-room-01" placeholder="test-room-01"/>

      <label>Тип звонка</label>
      <select id="callType">
        <option value="video">📹 Видео</option>
        <option value="audio">🎤 Аудио</option>
      </select>

      <button class="btn btn-primary" onclick="fetchToken()">Получить токен</button>
    </div>

    <!-- Token card -->
    <div class="card">
      <div class="card-title">🔑 Токен Agora</div>
      <label>Статус токена</label>
      <div id="tokenStatus" style="color:var(--muted); font-family:'Space Mono',monospace; font-size:0.82rem; margin-bottom:12px;">
        Токен не получен
      </div>
      <div id="tokenBox" class="token-display">—</div>
      <div class="divider"></div>
      <label>App ID</label>
      <input id="appIdDisplay" readonly placeholder="Получите токен выше"/>
    </div>
  </div>

  <!-- Video section -->
  <div class="video-section">
    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;">
      <div>
        <div class="card-title" style="margin-bottom:2px;">📺 Видеопоток</div>
        <span id="callTypeTag" class="tag tag-video">video</span>
      </div>
      <div style="display:flex; gap:10px;">
        <button id="joinBtn" class="btn btn-primary" style="width:auto; padding:10px 24px;" onclick="joinChannel()" disabled>
          📞 Войти в звонок
        </button>
      </div>
    </div>

    <div class="video-grid">
      <div class="video-box" id="localBox">
        <div class="video-empty" id="localEmpty">
          <div class="video-empty-icon">🎥</div>
          <span>Локальное видео</span>
        </div>
        <div id="local-video" style="width:100%;height:100%;"></div>
        <div class="video-label" id="localLabel">Вы (user: —)</div>
      </div>
      <div class="video-box" id="remoteBox">
        <div class="video-empty" id="remoteEmpty">
          <div class="video-empty-icon">👤</div>
          <span>Ждём собеседника...</span>
        </div>
        <div id="remote-video" style="width:100%;height:100%;"></div>
        <div class="video-label" id="remoteLabel">Собеседник</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn" id="muteAudioBtn" title="Микрофон" onclick="toggleAudio()" disabled>🎤</button>
      <button class="ctrl-btn end-call" id="leaveBtn" title="Завершить звонок" onclick="leaveChannel()" disabled>📵</button>
      <button class="ctrl-btn" id="muteVideoBtn" title="Камера" onclick="toggleVideo()" disabled>📹</button>
    </div>
  </div>

  <!-- Log -->
  <div class="card">
    <div class="card-title">🖥 Лог событий</div>
    <div id="logBox" class="log-box">
      <div class="log-line info">// Готов к работе. Получите токен и войдите в канал.</div>
    </div>
  </div>

</div>

<script>
  let agoraClient = null;
  let localAudioTrack = null;
  let localVideoTrack = null;
  let appId = '';
  let token = '';
  let isAudioMuted = false;
  let isVideoMuted = false;
  let isInCall = false; // флаг — находимся ли в звонке

  // ── Лог ──
  function log(msg, type='info') {
    const box = document.getElementById('logBox');
    const line = document.createElement('div');
    line.className = `log-line ${type}`;
    const ts = new Date().toLocaleTimeString('ru-RU');
    line.textContent = `[${ts}] ${msg}`;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
  }

  // ── Статус ──
  function setStatus(text, state='idle') {
    document.getElementById('statusText').textContent = text;
    const dot = document.getElementById('statusDot');
    dot.className = 'dot';
    if (state === 'connected') dot.classList.add('connected');
    if (state === 'calling') dot.classList.add('calling');
  }

  // ── Сбросить UI в исходное состояние (вызывается при любом выходе/ошибке) ──
  function resetUI() {
    isInCall = false;
    isAudioMuted = false;
    isVideoMuted = false;

    document.getElementById('localEmpty').style.display = 'flex';
    document.getElementById('remoteEmpty').style.display = 'flex';
    document.getElementById('local-video').innerHTML = '';
    document.getElementById('remote-video').innerHTML = '';

    document.getElementById('joinBtn').disabled = !appId; // активна если токен есть
    document.getElementById('leaveBtn').disabled = true;
    document.getElementById('muteAudioBtn').disabled = true;
    document.getElementById('muteVideoBtn').disabled = true;
    document.getElementById('muteAudioBtn').textContent = '🎤';
    document.getElementById('muteAudioBtn').classList.remove('muted');
    document.getElementById('muteVideoBtn').textContent = '📹';
    document.getElementById('muteVideoBtn').classList.remove('muted');
  }

  // ── Очистить треки и клиент ──
  async function cleanupTracks() {
    try { localAudioTrack?.close(); } catch(_) {}
    try { localVideoTrack?.close(); } catch(_) {}
    localAudioTrack = null;
    localVideoTrack = null;

    if (agoraClient) {
      try { await agoraClient.leave(); } catch(_) {}
      agoraClient = null;
    }
  }

  // ── Обновить тип звонка ──
  document.getElementById('callType').addEventListener('change', (e) => {
    const tag = document.getElementById('callTypeTag');
    tag.textContent = e.target.value;
    tag.className = `tag tag-${e.target.value}`;
  });

  // ── 1. Получить токен с бэкенда ──
  async function fetchToken() {
    const apiUrl = document.getElementById('apiUrl').value.trim();
    const userId = document.getElementById('userId').value.trim();
    const channel = document.getElementById('channelName').value.trim();

    if (!userId || !channel) { log('Заполните User ID и Channel!', 'err'); return; }

    log(`Запрос токена: user_id=${userId}, channel=${channel}...`);
    setStatus('Получаем токен...', 'calling');

    try {
      const res = await fetch(`${apiUrl}/api/token?user_id=${userId}&channel_name=${channel}&role=publisher`);
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);

      const data = await res.json();
      token = data.token;
      appId = data.app_id;

      document.getElementById('tokenBox').textContent = token;
      document.getElementById('appIdDisplay').value = appId;
      document.getElementById('tokenStatus').textContent = `✅ Получен (истекает ${new Date(data.expires_at * 1000).toLocaleTimeString('ru-RU')})`;
      document.getElementById('tokenStatus').style.color = 'var(--green)';
      document.getElementById('localLabel').textContent = `Вы (user: ${userId})`;
      document.getElementById('joinBtn').disabled = false;

      log(`Токен получен! App ID: ${appId.substring(0,8)}...`, 'ok');
      setStatus('Токен готов', 'connected');
    } catch(e) {
      log(`Ошибка получения токена: ${e.message}`, 'err');
      setStatus('Ошибка токена', 'idle');
    }
  }

  // ── 2. Войти в канал ──
  async function joinChannel() {
    const userId = parseInt(document.getElementById('userId').value);
    const channel = document.getElementById('channelName').value.trim();
    const callType = document.getElementById('callType').value;

    if (!appId || !token) { log('Сначала получите токен!', 'err'); return; }

    log(`Инициализация Agora... (${callType} звонок)`, 'info');
    setStatus('Подключение...', 'calling');

    // Блокируем кнопку входа на время подключения
    document.getElementById('joinBtn').disabled = true;

    try {
      agoraClient = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });

      agoraClient.on('user-published', handleUserPublished);
      agoraClient.on('user-unpublished', handleUserUnpublished);
      agoraClient.on('user-joined', (user) => log(`Пользователь ${user.uid} подключился`, 'ok'));
      agoraClient.on('user-left', (user) => {
        log(`Пользователь ${user.uid} отключился`, 'err');
        document.getElementById('remoteEmpty').style.display = 'flex';
        document.getElementById('remoteLabel').textContent = 'Ждём собеседника...';
      });
      agoraClient.on('token-privilege-will-expire', () => log('⚠️ Токен скоро истечёт!', 'err'));

      // Обработка неожиданного разрыва соединения
      agoraClient.on('connection-state-change', (curState, prevState) => {
        log(`Соединение: ${prevState} → ${curState}`, 'info');
        if (curState === 'DISCONNECTED' && isInCall) {
          log('⚠️ Соединение потеряно. Звонок завершён.', 'err');
          cleanupTracks().then(() => resetUI());
          setStatus('Соединение потеряно', 'idle');
        }
      });

      await agoraClient.join(appId, channel, token, userId);
      log(`Вошли в канал: ${channel}`, 'ok');

      // ── Микрофон ──
      // FIX: Пробуем получить микрофон. Если браузер не поддерживает getUserMedia
      // (HTTP без SSL) — пробуем без ограничений, иначе логируем ошибку.
      try {
        localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
        log('🎤 Микрофон захвачен', 'ok');
      } catch(audioErr) {
        log(`⚠️ Микрофон недоступен: ${audioErr.message}`, 'err');
        log('💡 Совет: откройте страницу через HTTPS (ngrok-ссылку), а не через http://localhost', 'info');
        // Продолжаем без микрофона — хотя бы войдём в канал
      }

      // ── Камера ──
      if (callType === 'video') {
        try {
          localVideoTrack = await AgoraRTC.createCameraVideoTrack();
          localVideoTrack.play('local-video');
          document.getElementById('localEmpty').style.display = 'none';
          log('📹 Камера захвачена', 'ok');
        } catch(videoErr) {
          log(`⚠️ Камера недоступна: ${videoErr.message}`, 'err');
          log('💡 Проверьте: разрешён ли доступ к камере в браузере, подключена ли камера', 'info');
          // Продолжаем без камеры — войдём в аудио режиме
        }
      }

      // Публикуем только те треки, которые успели создать
      const tracks = [localAudioTrack, localVideoTrack].filter(Boolean);
      if (tracks.length > 0) {
        await agoraClient.publish(tracks);
        log(`🚀 Опубликовано треков: ${tracks.length}`, 'ok');
      } else {
        log('⚠️ Войдёте только как слушатель (нет ни камеры, ни микрофона)', 'err');
      }

      isInCall = true;
      setStatus(`В звонке: ${channel}`, 'connected');

      // UI — кнопка выхода всегда активна после join
      document.getElementById('joinBtn').disabled = true;
      document.getElementById('leaveBtn').disabled = false;
      document.getElementById('muteAudioBtn').disabled = !localAudioTrack;
      document.getElementById('muteVideoBtn').disabled = !localVideoTrack;

    } catch(e) {
      log(`❌ Критическая ошибка подключения: ${e.message}`, 'err');
      setStatus('Ошибка подключения', 'idle');
      // FIX: при ошибке — чистим всё и разблокируем UI
      await cleanupTracks();
      resetUI();
    }
  }

  // ── Входящий участник ──
  async function handleUserPublished(user, mediaType) {
    try {
      await agoraClient.subscribe(user, mediaType);
      log(`Подписались на ${mediaType} пользователя ${user.uid}`, 'ok');

      if (mediaType === 'video') {
        document.getElementById('remoteEmpty').style.display = 'none';
        user.videoTrack.play('remote-video');
        document.getElementById('remoteLabel').textContent = `Пользователь: ${user.uid}`;
      }
      if (mediaType === 'audio') {
        user.audioTrack.play();
      }
    } catch(e) {
      log(`Ошибка подписки на ${mediaType}: ${e.message}`, 'err');
    }
  }

  function handleUserUnpublished(user, mediaType) {
    log(`Пользователь ${user.uid} остановил ${mediaType}`, 'info');
    if (mediaType === 'video') {
      document.getElementById('remoteEmpty').style.display = 'flex';
    }
  }

  // ── 3. Выйти из канала (работает всегда, даже после ошибок) ──
  async function leaveChannel() {
    log('Завершение звонка...', 'info');
    await cleanupTracks();
    resetUI();
    log('Звонок завершён ✅', 'ok');
    setStatus('Не подключён', 'idle');
  }

  // ── Управление микрофоном ──
  async function toggleAudio() {
    if (!localAudioTrack) return;
    isAudioMuted = !isAudioMuted;
    await localAudioTrack.setMuted(isAudioMuted);
    const btn = document.getElementById('muteAudioBtn');
    btn.textContent = isAudioMuted ? '🔇' : '🎤';
    btn.classList.toggle('muted', isAudioMuted);
    log(isAudioMuted ? 'Микрофон выключен 🔇' : 'Микрофон включён 🎤', 'info');
  }

  // ── Управление камерой ──
  async function toggleVideo() {
    if (!localVideoTrack) return;
    isVideoMuted = !isVideoMuted;
    await localVideoTrack.setMuted(isVideoMuted);
    const btn = document.getElementById('muteVideoBtn');
    btn.textContent = isVideoMuted ? '🚫' : '📹';
    btn.classList.toggle('muted', isVideoMuted);
    log(isVideoMuted ? 'Камера выключена 🚫' : 'Камера включена 📹', 'info');
  }
</script>
</body>
</html>
