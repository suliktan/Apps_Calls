# /etc/nginx/sites-available/agora-calls
# Заменить YOUR_DOMAIN на ваш реальный домен, например: calls.myapp.com

# HTTP → редирект на HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # SSL сертификаты (выдаёт Certbot автоматически)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Настройки безопасности SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Размер тела запроса (для будущих загрузок файлов)
    client_max_body_size 20M;

    # Проксируем все запросы в Docker контейнер
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Важно для WebSocket (Agora использует WS)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты для долгих соединений (звонки)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
